[[upstreams]]
serviceId = "sdkwork-manager-app-api"
baseUrl = "http://sdkwork-manager-standalone-gateway:18092"

[cors]
allowAnyOrigin = false
allowedOrigins = ["https://manager.sdkwork.com"]

[request]
maxBodyBytes = 33554432
timeoutMs = 30000

[readiness]
checkUpstreams = true
timeoutMs = 1000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = true
metricsPath = "/metrics"
tracingEnabled = true
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[diagnostics]
enabled = false
path = "/internal/gateway/diagnostics"
includePolicyInventory = true
includeRouteInventory = true

[security]
allowedHosts = ["manager.sdkwork.com", "api.sdkwork.com"]
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = true

[security.waf]
enabled = true
mode = "monitor"
inspectQuery = true
inspectHeaders = true
inspectJsonBody = false

[traffic]
rateLimitEnabled = true
compatXRateLimitHeaders = true
globalMaxInFlight = 1024
rateLimits = []
concurrencyLimits = []

[policy]
enabled = true
dryRun = false
rules = []

[resilience]
retryEnabled = true
maxAttempts = 2
retryStatuses = [502, 503, 504]
retryBackoffMs = 100
circuitBreakerEnabled = true
failureThreshold = 5
openSeconds = 30
halfOpenMaxAttempts = 1
