version: 1
defaultProfile: cloud.production

profiles:
  cloud.production:
    install:
      layout: binary-package
    expose:
      - domain: manager.sdkwork.com
        tls: sdkwork.com
        mode: web+api
        web: pc
    packages: []

  standalone.development:
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: pc
    packages: []
